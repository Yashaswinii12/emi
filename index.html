<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EMI Calculator - DevVerse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo-nav">
            <div class="logo">
                <div class="logo-icon">D</div>
                DevVerse
            </div>
        </div>
        <ul>
            <li><a href=#emicalculator >CALCULATOR</a></li>
            <li><a href=#history >History</a></li>
        </ul>
    </header>
    
    <!-- Main Content -->
    <section id="emicalculator">
        <div class="container">
            <h1>EMI Calculator</h1>
            <p class="subtitle">Calculate your monthly EMI with detailed interest and principal breakdown</p>

            <div class="calculator-wrapper">

                <!-- LEFT SECTION -->
                <div class="calculator-section" aria-label="EMI Inputs">
                    <!-- Loan Amount -->
                    <div class="input-group">
                        <div class="input-label">
                            <label for="loanAmount">Loan amount</label>
                            <span class="input-value">
                                ₹ <input type="number" id="loanAmountDisplay" min="100000" max="10000000" step="100000" value="1000000" inputmode="numeric">
                            </span>
                        </div>
                        <input type="range" id="loanAmount" min="100000" max="10000000" step="100000" value="1000000">
                    </div>

                    <!-- Interest -->
                    <div class="input-group">
                        <div class="input-label">
                            <label for="interestRate">Rate of interest (p.a)</label>
                            <span class="input-value">
                                <input type="number" id="interestRateDisplay" min="1" max="20" step="0.1" value="6.5" inputmode="decimal"> %
                            </span>
                        </div>
                        <input type="range" id="interestRate" min="1" max="20" step="0.1" value="6.5">
                    </div>

                    <!-- Tenure -->
                    <div class="input-group">
                        <div class="input-label">
                            <label for="tenure">Loan tenure</label>
                            <span class="input-value">
                                <input type="number" id="tenureDisplay" min="1" max="30" step="1" value="5" inputmode="numeric"> Yr
                            </span>
                        </div>
                        <input type="range" id="tenure" min="1" max="30" step="1" value="5">
                    </div>

                    <!-- Results -->
                    <div class="results" aria-live="polite">
                        <div class="result-row">
                            <span class="result-label">Monthly EMI</span>
                            <span class="result-value">₹<span id="monthlyEMI"></span></span>
                        </div>
                        <div class="result-row">
                            <span class="result-label">Principal amount</span>
                            <span class="result-value">₹<span id="principalAmount"></span></span>
                        </div>
                        <div class="result-row">
                            <span class="result-label">Total interest</span>
                            <span class="result-value">₹<span id="totalInterest"></span></span>
                        </div>
                    </div>
                </div>

                <!-- RIGHT SECTION -->
                <div class="calculator-section chart-section" aria-label="EMI Breakdown Chart">
  <div class="chart-box" >
    <div id="emiChart" class="donut-chart">
      <div id="chartCenter" class="chart-center" ></div>
    </div>
  </div>

  <div class="chart-legend">
    <div class="legend-item">
      <span class="legend-color principal"></span>
      Principal
    </div>
    <div class="legend-item">
      <span class="legend-color interest"></span>
      Interest Amount
    </div>
  </div>
</div>


            </div>
        </div>
    </section>

    <button id="save" value="save">Save</button>

    <section id="history">
        <h2>History</h2>
        <!-- Table is injected by JS -->
    </section>

    <!-- External JS -->
    <script src="script 1.js"></script>
</body>
</html>
